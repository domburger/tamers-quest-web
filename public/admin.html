<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tamers Quest — Admin</title>
<style>
  :root { --bg:#0e0e16; --panel:#181826; --border:#2e2e46; --text:#d6d6e2; --muted:#9090a8; --accent:#f0d77a; --ok:#4caf73; --err:#e0705a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:"Segoe UI",system-ui,sans-serif; line-height:1.5; }
  main { max-width:720px; margin:0 auto; padding:28px 20px 60px; }
  h1 { color:var(--accent); font-size:28px; margin:0 0 4px; }
  .muted { color:var(--muted); font-size:14px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:18px 20px; margin:18px 0; }
  h2 { font-size:16px; color:#fff; margin:0 0 12px; border-bottom:1px solid var(--border); padding-bottom:6px; }
  label { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; font-size:14px; }
  label span.k { color:var(--text); }
  label span.h { color:var(--muted); font-size:12px; flex:1; }
  input[type=number], input[type=password] { width:120px; background:#07070d; border:1px solid var(--border); color:var(--text); border-radius:6px; padding:6px 8px; font-size:14px; }
  input[type=password] { width:100%; }
  button { background:#3a5078; color:#eaf2ff; border:1px solid #6fb0e0; border-radius:7px; padding:9px 16px; font-size:14px; cursor:pointer; }
  button:hover { background:#46618f; }
  #status { margin-left:12px; font-size:13px; }
  .row { display:flex; align-items:center; margin-top:12px; }
  code { background:#000; padding:1px 5px; border-radius:4px; color:var(--accent); font-size:13px; }
  ul { margin:6px 0 0; padding-left:18px; font-size:13px; color:var(--muted); }
</style>
</head>
<body>
<main>
  <h1>Tamers Quest — Admin</h1>
  <div class="muted">Live game settings &amp; generated content. Requires <code>ADMIN_TOKEN</code>.</div>

  <div class="panel">
    <h2>Access</h2>
    <label><span class="k">Admin token</span></label>
    <input type="password" id="token" placeholder="ADMIN_TOKEN" />
    <div class="row"><button id="load">Connect</button><span id="status" class="muted"></span></div>
  </div>

  <div class="panel" id="cfgPanel" style="display:none">
    <h2>Game settings (apply to new rounds)</h2>
    <label><span class="k">Players per round (max)</span><span class="h">1–16</span><input type="number" id="minPlayers" min="1" max="16" step="1"></label>
    <label><span class="k">Round duration (s)</span><span class="h">30–3600</span><input type="number" id="roundDurationS" min="30" max="3600" step="10"></label>
    <label><span class="k">Safe zone starts (s)</span><span class="h">0–3600</span><input type="number" id="circleStartS" min="0" max="3600" step="10"></label>
    <label><span class="k">Portal interval (s)</span><span class="h">1–600</span><input type="number" id="portalIntervalS" min="1" max="600" step="5"></label>
    <label><span class="k">AI monster gen rate</span><span class="h">0–1 (chance/round; costs OpenAI)</span><input type="number" id="monsterGenRate" min="0" max="1" step="0.05"></label>
    <label><span class="k">PvP enabled</span><span class="h">FFA duels on collision</span><input type="checkbox" id="pvpEnabled"></label>
    <div class="row"><button id="save">Save &amp; apply</button><span id="saveStatus" class="muted"></span></div>
  </div>

  <div class="panel" id="genPanel" style="display:none">
    <h2>AI-generated monsters (<span id="genCount">0</span>)</h2>
    <ul id="genList"></ul>
  </div>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  const NUMS = ["minPlayers","roundDurationS","circleStartS","portalIntervalS","monsterGenRate"];
  const token = () => $("token").value.trim();
  const hdr = () => ({ "x-admin-token": token() });

  $("token").value = localStorage.getItem("tq_admin_token") || "";

  async function load() {
    $("status").textContent = "Connecting…"; $("status").style.color = "var(--muted)";
    try {
      const r = await fetch("/api/admin/config", { headers: hdr() });
      if (!r.ok) throw new Error(r.status === 401 ? "wrong token" : r.status === 503 ? "ADMIN_TOKEN not set on server" : "HTTP " + r.status);
      const c = await r.json();
      for (const k of NUMS) $(k).value = c[k];
      $("pvpEnabled").checked = !!c.pvpEnabled;
      localStorage.setItem("tq_admin_token", token());
      $("cfgPanel").style.display = ""; $("genPanel").style.display = "";
      $("status").textContent = "Connected."; $("status").style.color = "var(--ok)";
      loadMonsters();
    } catch (e) { $("status").textContent = e.message; $("status").style.color = "var(--err)"; }
  }
  async function save() {
    const patch = { pvpEnabled: $("pvpEnabled").checked };
    for (const k of NUMS) patch[k] = Number($(k).value);
    $("saveStatus").textContent = "Saving…"; $("saveStatus").style.color = "var(--muted)";
    try {
      const r = await fetch("/api/admin/config", { method: "POST", headers: { ...hdr(), "Content-Type": "application/json" }, body: JSON.stringify(patch) });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const out = await r.json();
      for (const k of NUMS) $(k).value = out.config[k];
      $("pvpEnabled").checked = !!out.config.pvpEnabled;
      $("saveStatus").textContent = "Saved & applied."; $("saveStatus").style.color = "var(--ok)";
    } catch (e) { $("saveStatus").textContent = e.message; $("saveStatus").style.color = "var(--err)"; }
  }
  async function loadMonsters() {
    try {
      const r = await fetch("/api/admin/monsters", { headers: hdr() });
      if (!r.ok) return;
      const { generated } = await r.json();
      $("genCount").textContent = generated.length;
      $("genList").innerHTML = generated.length
        ? generated.map((m) => `<li>${m.typeName} — ${m.element} · rarity ${m.rarity}</li>`).join("")
        : "<li>None yet. Set the gen rate &gt; 0 to start generating.</li>";
    } catch {}
  }
  $("load").onclick = load;
  $("save").onclick = save;
</script>
</body>
</html>
