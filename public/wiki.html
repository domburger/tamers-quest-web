<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tamer's Quest — Wiki has moved</title>
<meta name="robots" content="noindex" />
<!-- ARCHIVED 2026-06-11: this in-app wiki was migrated to the canonical GitHub Wiki.
     The full historical content of this page lives in git history. -->
<meta http-equiv="refresh" content="3; url=https://github.com/domburger/tamers-quest-web/wiki" />
<style>
  :root { --bg:#15171c; --panel:#1d2027; --text:#e7e9ee; --mut:#9aa3ad; --accent:#5ad1c9; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:var(--bg); color:var(--text); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; padding:24px; }
  .card { max-width:560px; background:var(--panel); border:1px solid #2a2e37; border-radius:14px; padding:32px 28px; text-align:center; }
  h1 { font-size:22px; margin:0 0 12px; }
  p { color:var(--mut); margin:0 0 18px; }
  a.btn { display:inline-block; background:var(--accent); color:#0c1413; font-weight:600; text-decoration:none;
          padding:11px 20px; border-radius:9px; }
  a.btn:hover { filter:brightness(1.08); }
  .links { margin-top:20px; font-size:14px; }
  .links a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
  <main class="card">
    <h1>📖 The Tamer's Quest wiki has moved</h1>
    <p>The game-logic wiki is now maintained as the project's <strong>GitHub Wiki</strong> —
       the single, code-mirrored source of truth. This in-app page is archived; you'll be
       redirected in a moment.</p>
    <a class="btn" href="https://github.com/domburger/tamers-quest-web/wiki">Go to the GitHub Wiki →</a>
    <div class="links">
      <a href="/legal">Legal &amp; Privacy</a> &nbsp;·&nbsp;
      <a href="/">Back to the game</a>
    </div>
  </main>
</body>
</html>
