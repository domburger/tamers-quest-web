<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Tamer's Quest</title>
  <meta name="description" content="A real-time multiplayer monster-taming extraction RPG." />
  <meta name="theme-color" content="#0C0A14" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tamer's Quest" />
  <style>
    /* Fonts: Electrolize = primary (everywhere, incl. in-canvas via main.js);
       Fredoka = smaller text / informative pages. */
    @font-face { font-family:"Electrolize"; src:url("/assets/font/electrolize-400.woff2") format("woff2"); font-weight:400; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-400.woff2") format("woff2"); font-weight:400; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-500.woff2") format("woff2"); font-weight:500; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-600.woff2") format("woff2"); font-weight:600; font-display:swap; }

    :root{
      --font:"Electrolize", system-ui, sans-serif; --font-soft:"Fredoka", system-ui, sans-serif;
      --bg:#0C0A14; --teal:#2FD3B5; --teal-bright:#5BF0D6; --violet:#9B7FE6;
      --ink:#ECF4EF; --muted:#9AA6B2; --fire:#FF6A4D; --water:#46A6FF; --nature:#5BD17E; --amber:#E0A85C;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden; background:var(--bg);
      font-family:var(--font);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility;
      touch-action:none; -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
    }
    canvas { display:block; }

    /* ─── Title screen (pure HTML/CSS/SVG, fills any resolution, no borders) ─── */
    #title{
      position:fixed; inset:0; z-index:50; overflow:hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:clamp(18px, 3.2vh, 40px);
      background:radial-gradient(120% 90% at 50% 38%, #1a1530 0%, #0e0b18 48%, #070510 100%);
      color:var(--ink);
      padding:max(env(safe-area-inset-top),20px) 20px max(env(safe-area-inset-bottom),20px);
      transition:opacity .6s ease, visibility .6s ease;
    }
    #title.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

    /* layered backdrop */
    #title .layer{ position:absolute; inset:0; pointer-events:none; }
    .vignette{ background:radial-gradient(110% 80% at 50% 42%, transparent 52%, rgba(4,3,9,.85) 100%); }

    /* spirit portal — concentric rings rotating + pulsing behind the figure */
    .portal{ display:flex; align-items:center; justify-content:center; top:6%; }
    .portal .ring{
      position:absolute; border-radius:50%; border:2px solid rgba(47,211,181,.30);
      width:var(--s); height:var(--s); animation:spin var(--d) linear infinite, breathe 5s ease-in-out infinite;
    }
    .portal .ring:nth-child(1){ --s:min(46vh,560px); --d:60s; border-color:rgba(47,211,181,.10); }
    .portal .ring:nth-child(2){ --s:min(34vh,430px); --d:42s; animation-direction:reverse; border-color:rgba(155,127,230,.16); }
    .portal .ring:nth-child(3){ --s:min(24vh,300px); --d:30s; border-color:rgba(91,240,214,.28); }
    .portal .core{
      position:absolute; width:min(13vh,150px); height:min(13vh,150px); border-radius:50%;
      background:radial-gradient(circle, rgba(220,255,248,.9) 0%, rgba(47,211,181,.55) 30%, rgba(47,211,181,0) 70%);
      filter:blur(2px); animation:breathe 4s ease-in-out infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg);} }
    @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.85;} 50%{ transform:scale(1.06); opacity:1;} }

    /* gnarled trees framing the bottom */
    .trees{ bottom:0; }
    .trees svg{ position:absolute; bottom:0; width:min(34vw,380px); height:auto; opacity:.9; }
    .trees .l{ left:-2%; } .trees .r{ right:-2%; transform:scaleX(-1); }

    .motes, .spirits{ }   /* JS-populated */
    .mote{ position:absolute; bottom:-10px; width:3px; height:3px; border-radius:50%;
      background:var(--teal-bright); box-shadow:0 0 6px var(--teal); opacity:0; animation:rise linear infinite; }
    @keyframes rise{ 0%{ transform:translateY(0) translateX(0); opacity:0;} 12%{opacity:.8;}
      100%{ transform:translateY(-104vh) translateX(var(--dx,0)); opacity:0;} }
    .spirit{ position:absolute; width:var(--ss,16px); height:var(--ss,16px); border-radius:50%;
      background:radial-gradient(circle, var(--c) 0%, transparent 70%); opacity:.5;
      animation:drift var(--sd,18s) ease-in-out infinite alternate; }
    @keyframes drift{ from{ transform:translate(0,0);} to{ transform:translate(var(--mx,30px), var(--my,-40px)); } }

    /* foreground content */
    .stage{ position:relative; z-index:2; display:flex; flex-direction:column; align-items:center;
      gap:clamp(14px,2.4vh,28px); animation:risein 1s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes risein{ from{ opacity:0; transform:translateY(26px);} to{ opacity:1; transform:none;} }

    .figure{ width:clamp(120px,16vh,190px); height:auto; filter:drop-shadow(0 8px 20px rgba(0,0,0,.6)); }
    .figure .chain{ transform-origin:147px 150px; animation:spin 14s linear infinite; }
    .figure .glow{ animation:breathe 3.2s ease-in-out infinite; transform-origin:147px 150px; }

    .logo{ text-align:center; line-height:.92; letter-spacing:-.02em; }
    .logo .t1{ display:block; font-weight:800; font-size:clamp(40px,9.5vh,104px); color:var(--ink);
      text-shadow:0 2px 24px rgba(0,0,0,.5); }
    .logo .t2{ display:block; font-weight:800; font-size:clamp(46px,11vh,120px);
      background:linear-gradient(180deg, var(--teal-bright), var(--teal)); -webkit-background-clip:text;
      background-clip:text; color:transparent; filter:drop-shadow(0 0 26px rgba(47,211,181,.45)); }
    .rule{ width:clamp(120px,16vh,200px); height:4px; border-radius:2px; margin:6px auto 0;
      background:linear-gradient(90deg, transparent, var(--violet), var(--teal), transparent); }
    .tagline{ font-family:var(--font-soft); color:var(--muted); font-weight:500; letter-spacing:.26em; font-size:clamp(10px,1.5vh,15px); text-transform:uppercase; }

    .actions{ display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:6px; }
    .btn{ font-family:inherit; font-weight:700; font-size:clamp(15px,2vh,20px); letter-spacing:.01em;
      width:clamp(220px,30vh,300px); padding:14px 22px; border-radius:14px; cursor:pointer; color:var(--ink);
      background:rgba(34,29,49,.7); border:1px solid rgba(255,255,255,.08); backdrop-filter:blur(6px);
      transition:transform .15s ease, box-shadow .25s ease, background .2s ease, border-color .2s ease; }
    .btn:hover{ transform:translateY(-2px); }
    .btn.primary{ background:linear-gradient(180deg, var(--teal-bright), var(--teal)); color:#04231C; border:none;
      box-shadow:0 6px 22px rgba(47,211,181,.35); }
    .btn.primary:hover{ box-shadow:0 10px 34px rgba(47,211,181,.6); }
    .btn.ghost:hover{ border-color:var(--teal); box-shadow:0 0 22px rgba(47,211,181,.22); background:rgba(40,34,56,.8); }
    .btn-row{ display:flex; gap:12px; }
    .btn-row .btn{ width:clamp(106px,15vh,144px); padding:12px 14px; font-size:clamp(13px,1.7vh,16px); }

    .leaderboard{ position:absolute; top:max(env(safe-area-inset-top),18px); left:18px; z-index:3;
      font-family:var(--font-soft);
      background:rgba(22,19,31,.7); border:1px solid rgba(255,255,255,.07); border-radius:14px;
      padding:14px 16px; font-size:13px; min-width:210px; backdrop-filter:blur(6px);
      opacity:0; transform:translateY(-6px); transition:opacity .5s ease, transform .5s ease; }
    .leaderboard.show{ opacity:1; transform:none; }
    .leaderboard h3{ font-size:11px; letter-spacing:.18em; color:var(--teal); text-transform:uppercase; margin-bottom:8px; }
    .leaderboard ol{ list-style:none; display:flex; flex-direction:column; gap:5px; }
    .leaderboard li{ display:flex; justify-content:space-between; gap:14px; color:var(--ink); }
    .leaderboard li span:last-child{ color:var(--teal-bright); font-weight:700; }
    .version{ position:absolute; right:16px; bottom:14px; z-index:3; font-family:var(--font-soft); color:var(--muted); font-size:12px; opacity:.7; }

    @media (max-width:560px){ .leaderboard{ display:none; } }

    /* portrait touch rotate prompt (kept) */
    #rotate-notice{ display:none; }
    @media (orientation:portrait) and (pointer:coarse){
      #rotate-notice{ display:flex; position:fixed; inset:0; z-index:9999; flex-direction:column;
        align-items:center; justify-content:center; gap:18px; text-align:center; background:var(--bg); color:var(--ink);
        font-family:var(--font);
        padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px); }
      #rotate-notice svg{ width:84px; height:84px; animation:rotate-hint 2.4s ease-in-out infinite; }
      #rotate-notice .t{ font-size:22px; font-weight:800; color:var(--teal); }
      #rotate-notice .s{ font-size:15px; color:var(--muted); max-width:280px; line-height:1.5; }
    }
    @keyframes rotate-hint{ 0%,40%{ transform:rotate(0);} 60%,100%{ transform:rotate(-90deg);} }
  </style>
</head>
<body>
  <!-- ─── Animated HTML title (game elements, any resolution, no borders) ─── -->
  <div id="title">
    <div class="layer portal" aria-hidden="true">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="core"></div>
    </div>
    <div class="layer motes" id="motes" aria-hidden="true"></div>
    <div class="layer spirits" id="spirits" aria-hidden="true"></div>
    <div class="layer trees" aria-hidden="true">
      <svg class="l" viewBox="0 0 200 260"><path fill="#08060f" d="M60 260c-4-70 6-120 0-160-3-22-22-30-30-58 18 10 26 26 34 30 2-26-6-44-2-66 10 22 14 40 22 52 6-16 4-30 14-44-2 24 2 40 6 60 8-10 14-24 28-30-12 22-26 30-30 56-6 40 2 90-2 160Z"/></svg>
      <svg class="r" viewBox="0 0 200 260"><path fill="#08060f" d="M60 260c-4-70 6-120 0-160-3-22-22-30-30-58 18 10 26 26 34 30 2-26-6-44-2-66 10 22 14 40 22 52 6-16 4-30 14-44-2 24 2 40 6 60 8-10 14-24 28-30-12 22-26 30-30 56-6 40 2 90-2 160Z"/></svg>
    </div>
    <div class="layer vignette" aria-hidden="true"></div>

    <div class="leaderboard" id="leaderboard"><h3>Top Extractors</h3><ol id="lb-list"></ol></div>

    <div class="stage">
      <div class="logo">
        <span class="t1">Tamer's</span>
        <span class="t2">Quest</span>
        <div class="rule"></div>
      </div>
      <div class="tagline">Monster Taming · Cave Extraction</div>

      <!-- hooded spirit-tamer holding a glowing spirit-chain ring -->
      <svg class="figure" viewBox="0 0 200 230" aria-hidden="true">
        <ellipse cx="100" cy="216" rx="46" ry="9" fill="rgba(0,0,0,.45)"/>
        <!-- cloak -->
        <path fill="#16121f" stroke="rgba(47,211,181,.18)" stroke-width="2"
          d="M100 60c-30 0-44 26-50 70-4 30-6 56-16 78 22 6 38 8 66 8s44-2 66-8c-10-22-12-48-16-78-6-44-20-70-50-70Z"/>
        <!-- hood -->
        <path fill="#1b1626" stroke="rgba(47,211,181,.18)" stroke-width="2"
          d="M100 26c-20 0-32 18-30 44 2 18 14 28 30 28s28-10 30-28c2-26-10-44-30-44Z"/>
        <!-- arm to chain -->
        <path d="M132 120c12 4 18 14 16 30" stroke="#16121f" stroke-width="10" fill="none" stroke-linecap="round"/>
        <!-- spirit-chain ring (glow + rotating links) -->
        <g class="glow"><circle cx="147" cy="150" r="26" fill="none" stroke="rgba(47,211,181,.25)" stroke-width="9"/></g>
        <circle cx="147" cy="150" r="20" fill="none" stroke="#5BF0D6" stroke-width="2.5"/>
        <g class="chain" fill="#dffff7">
          <circle cx="147" cy="130" r="2.4"/><circle cx="161" cy="136" r="2.4"/><circle cx="167" cy="150" r="2.4"/>
          <circle cx="161" cy="164" r="2.4"/><circle cx="147" cy="170" r="2.4"/><circle cx="133" cy="164" r="2.4"/>
          <circle cx="127" cy="150" r="2.4"/><circle cx="133" cy="136" r="2.4"/>
        </g>
        <circle cx="147" cy="150" r="3.4" fill="#eafff9"/>
      </svg>

      <div class="actions">
        <button class="btn primary" data-go="onlineLobby">Play Online</button>
        <div class="btn-row">
          <button class="btn ghost" data-go="characterSelect">Single Player</button>
          <button class="btn ghost" data-go="bestiary">Bestiary</button>
        </div>
      </div>
    </div>
    <div class="version">v1.0.0</div>
  </div>

  <div id="rotate-notice" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2FD3B5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2.5" width="10" height="19" rx="2" />
      <line x1="7" y1="18.5" x2="17" y2="18.5" />
      <circle cx="12" cy="20" r="0.4" fill="#2FD3B5" />
    </svg>
    <div class="t">Rotate your device</div>
    <div class="s">Tamer's Quest plays best in landscape. Turn your phone sideways to begin.</div>
  </div>

  <script>
    // Spirit motes drifting upward.
    (function(){
      const m = document.getElementById("motes");
      for (let i=0;i<34;i++){
        const d=document.createElement("div"); d.className="mote";
        d.style.left=(Math.random()*100)+"vw";
        d.style.setProperty("--dx",(Math.random()*60-30)+"px");
        const dur=(7+Math.random()*9); d.style.animationDuration=dur+"s"; d.style.animationDelay=(-Math.random()*dur)+"s";
        const sz=(1.5+Math.random()*2.5); d.style.width=d.style.height=sz+"px";
        m.appendChild(d);
      }
      // A few drifting element spirits (monsters' essence).
      const s=document.getElementById("spirits");
      const cols=["#FF6A4D","#46A6FF","#5BD17E","#9B7FE6","#E0A85C","#2FD3B5"];
      for(let i=0;i<6;i++){
        const e=document.createElement("div"); e.className="spirit";
        e.style.setProperty("--c",cols[i%cols.length]);
        e.style.left=(8+Math.random()*84)+"vw"; e.style.top=(14+Math.random()*64)+"vh";
        e.style.setProperty("--ss",(14+Math.random()*26)+"px");
        e.style.setProperty("--mx",(Math.random()*80-40)+"px"); e.style.setProperty("--my",(Math.random()*-90-20)+"px");
        e.style.setProperty("--sd",(12+Math.random()*12)+"s"); e.style.animationDelay=(-Math.random()*10)+"s";
        s.appendChild(e);
      }
    })();

    // Launch the game: hide the title, tell the Phaser game where to go.
    // window.tqGo is defined by main.js once the engine is ready; queue if not.
    function launch(dest){
      const t=document.getElementById("title"); if(t) t.classList.add("hidden");
      const tryGo=()=>{ if(window.tqGo){ window.tqGo(dest); } else { setTimeout(tryGo,80); } };
      tryGo();
    }
    document.querySelectorAll("#title [data-go]").forEach(b=>b.addEventListener("click",()=>launch(b.dataset.go)));

    // Re-show the title when the game returns to it (main.js dispatches this).
    window.addEventListener("tq:title", ()=>{ const t=document.getElementById("title"); if(t) t.classList.remove("hidden"); });

    // Leaderboard (top extractors) from the live server.
    fetch("/api/leaderboard").then(r=>r.ok?r.json():null).then(d=>{
      const top=(d&&d.extractions)||[]; if(!top.length) return;
      document.getElementById("lb-list").innerHTML = top.slice(0,5)
        .map((e,i)=>`<li><span>${i+1}. ${(e.name||"?").replace(/[<>&]/g,"")}</span><span>${e.value}</span></li>`).join("");
      document.getElementById("leaderboard").classList.add("show");
    }).catch(()=>{});
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
