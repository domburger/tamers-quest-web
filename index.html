<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Tamers Quest</title>
  <meta name="description" content="A real-time multiplayer monster-taming extraction RPG." />
  <meta name="theme-color" content="#0a0a12" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tamers Quest" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #0a0a0a;
      /* Prevent iOS double-tap zoom / rubber-band scrolling during play. */
      touch-action: none; -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    /* Kaboom letterboxes the 16:9 canvas to fit any window while keeping aspect. */
    canvas { display: block; }

    /* Landscape-only: prompt touch users in portrait to rotate. Pure CSS so it
       works before the JS bundle loads. `pointer: coarse` ≈ touch device, so a
       narrow desktop window won't trigger it. */
    #rotate-notice { display: none; }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-notice {
        display: flex; position: fixed; inset: 0; z-index: 9999;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 18px; text-align: center;
        background: #0a0a12; color: #d6d6e2;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        padding: calc(env(safe-area-inset-top) + 24px) calc(env(safe-area-inset-right) + 24px)
                 calc(env(safe-area-inset-bottom) + 24px) calc(env(safe-area-inset-left) + 24px);
      }
      #rotate-notice svg { width: 84px; height: 84px; animation: rotate-hint 2.4s ease-in-out infinite; }
      #rotate-notice .t { font-size: 22px; font-weight: 700; color: #f0d77a; }
      #rotate-notice .s { font-size: 15px; color: #9090a8; max-width: 280px; line-height: 1.5; }
    }
    @keyframes rotate-hint {
      0%, 40% { transform: rotate(0deg); }
      60%, 100% { transform: rotate(-90deg); }
    }
  </style>
</head>
<body>
  <div id="rotate-notice" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="#f0d77a" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2.5" width="10" height="19" rx="2" />
      <line x1="7" y1="18.5" x2="17" y2="18.5" />
      <circle cx="12" cy="20" r="0.4" fill="#f0d77a" />
    </svg>
    <div class="t">Rotate your device</div>
    <div class="s">Tamers Quest plays best in landscape. Turn your phone sideways to begin.</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
