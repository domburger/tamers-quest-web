<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Tamer's Quest</title>
  <meta name="description" content="A real-time multiplayer monster-taming extraction RPG." />
  <meta name="theme-color" content="#0C0A14" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tamer's Quest" />
  <style>
    @font-face { font-family:"Electrolize"; src:url("/assets/font/electrolize-400.woff2") format("woff2"); font-weight:400; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-400.woff2") format("woff2"); font-weight:400; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-500.woff2") format("woff2"); font-weight:500; font-display:swap; }
    @font-face { font-family:"Fredoka"; src:url("/assets/font/fredoka-600.woff2") format("woff2"); font-weight:600; font-display:swap; }

    :root{
      --font:"Electrolize", system-ui, sans-serif; --font-soft:"Fredoka", system-ui, sans-serif;
      --bg:#070708; --teal:#2FD3B5; --teal-bright:#5BF0D6; --violet:#9B7FE6;
      --ink:#FFFFFF; --muted:#FFFFFF; --px:0px; --py:0px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:var(--font);
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility;
      touch-action:none; -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
    }
    canvas { display:block; }

    /* ─── Title screen (pure HTML/CSS/SVG, fills any resolution, no borders) ─── */
    #title{ position:fixed; inset:0; z-index:50; overflow:hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:radial-gradient(130% 100% at 50% 36%, #161618 0%, #0b0b0c 48%, #050505 100%);
      color:var(--ink); padding:max(env(safe-area-inset-top),20px) 20px max(env(safe-area-inset-bottom),20px);
      transition:opacity .6s ease, visibility .6s ease; }
    #title.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
    #title .layer{ position:absolute; inset:0; pointer-events:none; }

    .rays{ display:flex; align-items:center; justify-content:center;
      transform:translate(calc(var(--px)*.2), calc(var(--py)*.2)); transition:transform .25s ease-out; }
    .rays::before{ content:""; position:absolute; top:34%; left:50%; width:160vmax; height:160vmax; transform:translate(-50%,-50%);
      background:conic-gradient(from 0deg, transparent 0 8deg, rgba(47,211,181,.07) 9deg 12deg, transparent 13deg 28deg,
        rgba(155,127,230,.06) 29deg 33deg, transparent 34deg); animation:spin 90s linear infinite; }

    .fog .fb{ position:absolute; width:60vmax; height:40vmax; border-radius:50%; filter:blur(60px); opacity:.5; }
    .fog .fb1{ left:-10vmax; top:30%; background:radial-gradient(circle, rgba(47,211,181,.10), transparent 70%); animation:fogA 26s ease-in-out infinite alternate; }
    .fog .fb2{ right:-12vmax; top:18%; background:radial-gradient(circle, rgba(155,127,230,.10), transparent 70%); animation:fogB 32s ease-in-out infinite alternate; }
    @keyframes fogA{ from{ transform:translate(0,0);} to{ transform:translate(8vmax,-4vmax);} }
    @keyframes fogB{ from{ transform:translate(0,0);} to{ transform:translate(-7vmax,5vmax);} }

    .portal{ display:flex; align-items:center; justify-content:center; top:4%;
      transform:translate(calc(var(--px)*.45), calc(var(--py)*.45)); transition:transform .25s ease-out; }
    .portal .ring{ position:absolute; border-radius:50%; border:2px solid rgba(47,211,181,.30);
      width:var(--s); height:var(--s); animation:spin var(--d) linear infinite, breathe 5s ease-in-out infinite; }
    .portal .ring:nth-child(1){ --s:min(58vh,680px); --d:80s; border-color:rgba(47,211,181,.07); }
    .portal .ring:nth-child(2){ --s:min(46vh,560px); --d:60s; animation-direction:reverse; border-color:rgba(155,127,230,.12); border-style:dashed; }
    .portal .ring:nth-child(3){ --s:min(34vh,430px); --d:42s; border-color:rgba(47,211,181,.20); }
    .portal .ring:nth-child(4){ --s:min(24vh,300px); --d:30s; animation-direction:reverse; border-color:rgba(91,240,214,.30); }
    .portal .core{ position:absolute; width:min(15vh,170px); height:min(15vh,170px); border-radius:50%;
      background:radial-gradient(circle, rgba(225,255,250,.95) 0%, rgba(91,240,214,.6) 26%, rgba(47,211,181,.18) 52%, transparent 72%);
      filter:blur(2px); animation:breathe 4s ease-in-out infinite; }
    @keyframes spin{ to{ transform:rotate(360deg);} }
    @keyframes breathe{ 0%,100%{ transform:scale(1); opacity:.85;} 50%{ transform:scale(1.07); opacity:1;} }

    /* scenery (fractal trees + ground) — strongest parallax */
    .scenery{ transform:translate(calc(var(--px)*1.3), calc(var(--py)*.6)); transition:transform .25s ease-out; }
    .scenery .treesvg{ position:absolute; inset:0; width:100%; height:100%; }
    .scenery .ground{ position:absolute; left:-2%; right:-2%; bottom:-1px; width:104%; height:auto; }

    .mote{ position:absolute; bottom:-12px; border-radius:50%; opacity:0; animation:rise linear infinite; }
    @keyframes rise{ 0%{ transform:translateY(0) translateX(0); opacity:0;} 12%{opacity:.85;}
      100%{ transform:translateY(-106vh) translateX(var(--dx,0)); opacity:0;} }

    /* one-time "portal awakens" intro */
    .intro::after{ content:""; position:absolute; inset:0; background:radial-gradient(circle at 50% 38%, rgba(205,255,248,.55), transparent 46%); animation:flash 1s ease-out both; }
    .intro::before{ content:""; position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; border:3px solid rgba(120,255,235,.85); animation:shock 1.3s cubic-bezier(.15,.7,.2,1) both; }
    @keyframes flash{ 0%{opacity:0;} 8%{opacity:1;} 100%{opacity:0;} }
    @keyframes shock{ 0%{ width:20px;height:20px;opacity:0;} 9%{opacity:.9;} 100%{ width:170vmax;height:170vmax;opacity:0;border-width:1px;} }

    .stage{ position:relative; z-index:3; display:flex; flex-direction:column; align-items:center;
      gap:clamp(12px,2.2vh,26px); animation:risein 1.1s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes risein{ from{ opacity:0; transform:translateY(28px);} to{ opacity:1; transform:none;} }

    .logo{ text-align:center; line-height:.9; letter-spacing:-.01em; animation:floaty 7s ease-in-out infinite; }
    @keyframes floaty{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
    .logo .t1, .logo .t2{ display:block; font-weight:700; font-size:clamp(56px,13.5vh,150px); color:#fff;
      text-shadow:0 2px 26px rgba(0,0,0,.55); -webkit-text-stroke:1px #fff; }
    @keyframes shimmer{ from{ background-position:200% 0;} to{ background-position:-60% 0;} }
    .rule{ width:clamp(140px,18vh,240px); height:3px; border-radius:2px; margin:8px auto 0;
      background:linear-gradient(90deg, transparent, var(--violet), var(--teal-bright), var(--violet), transparent); box-shadow:0 0 14px rgba(47,211,181,.4); }
    .tagline{ font-family:var(--font-soft); color:#fff; font-weight:500; letter-spacing:.3em; font-size:clamp(10px,1.5vh,15px); text-transform:uppercase; }

    .actions{ display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:8px; }
    .btn{ position:relative; overflow:hidden; font-family:inherit; font-weight:700; font-size:clamp(15px,2vh,20px); letter-spacing:.02em;
      width:clamp(230px,32vh,320px); padding:15px 24px; border-radius:14px; cursor:pointer; color:#fff;
      background:rgba(34,29,49,.66); border:1px solid rgba(255,255,255,.09); backdrop-filter:blur(6px);
      transition:transform .15s ease, box-shadow .25s ease, background .2s ease, border-color .2s ease; }
    .btn::after{ content:""; position:absolute; inset:0; transform:translateX(-130%); background:linear-gradient(115deg, transparent 35%, rgba(255,255,255,.28) 50%, transparent 65%); }
    .btn:hover::after{ animation:shine .7s ease; }
    @keyframes shine{ to{ transform:translateX(130%);} }
    .btn:hover{ transform:translateY(-2px); }
    .btn:active{ transform:translateY(0) scale(.98); }
    .btn.primary{ background:linear-gradient(180deg, var(--teal-bright), var(--teal)); color:#04231C; border:none; box-shadow:0 6px 24px rgba(47,211,181,.4); }
    .btn.primary:hover{ box-shadow:0 12px 38px rgba(47,211,181,.65); }
    .btn.ghost:hover{ border-color:var(--teal); box-shadow:0 0 24px rgba(47,211,181,.24); background:rgba(42,35,58,.82); }
    .btn-row{ display:flex; gap:12px; }
    .btn-row .btn{ width:clamp(112px,16vh,154px); padding:13px 14px; font-size:clamp(13px,1.7vh,16px); }
    .hint{ font-family:var(--font-soft); color:#fff; opacity:.85; font-size:clamp(11px,1.5vh,14px); letter-spacing:.04em; margin-top:2px; animation:blink 2.4s ease-in-out infinite; }
    @keyframes blink{ 0%,100%{ opacity:.4;} 50%{ opacity:.95;} }

    /* login placeholders */
    .logins{ display:flex; flex-direction:column; align-items:center; gap:8px; margin-top:8px; }
    .sep{ font-family:var(--font-soft); color:#fff; opacity:.5; font-size:clamp(10px,1.4vh,13px); letter-spacing:.22em; text-transform:uppercase; margin-top:2px; }
    .btn.login{ font-family:var(--font-soft); font-weight:600; width:clamp(230px,32vh,320px); padding:11px 18px;
      font-size:clamp(13px,1.7vh,16px); background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.14); }
    .btn.login:hover{ border-color:var(--teal); box-shadow:0 0 18px rgba(47,211,181,.18); background:rgba(255,255,255,.09); }
    /* toast */
    #toast{ position:fixed; left:50%; bottom:34px; z-index:60; font-family:var(--font-soft); color:#fff;
      background:rgba(18,18,22,.94); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px 16px;
      font-size:14px; opacity:0; pointer-events:none; transform:translateX(-50%) translateY(12px); transition:opacity .25s ease, transform .25s ease; }
    #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    /* cave entrance behind the figure */
    .cave{ transform:translate(calc(var(--px)*.35), calc(var(--py)*.35)); transition:transform .25s ease-out; }
    .cave svg{ position:absolute; left:50%; bottom:0; transform:translateX(-50%); width:min(74vh,760px); height:auto; }
    .storelink{ font-family:var(--font-soft); font-weight:600; background:none; border:none; cursor:pointer;
      color:var(--teal-bright); font-size:clamp(12px,1.6vh,15px); letter-spacing:.06em; padding:4px 8px; opacity:.92;
      transition:opacity .2s, text-shadow .2s; }
    .storelink:hover{ opacity:1; text-shadow:0 0 16px rgba(47,211,181,.6); }

    .leaderboard{ position:absolute; top:max(env(safe-area-inset-top),18px); left:18px; z-index:4; font-family:var(--font-soft);
      background:rgba(22,19,31,.66); border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:14px 16px; font-size:13px; min-width:212px; backdrop-filter:blur(8px);
      opacity:0; transform:translateY(-6px); transition:opacity .5s ease, transform .5s ease; }
    .leaderboard.show{ opacity:1; transform:none; }
    .leaderboard h3{ font-size:11px; letter-spacing:.18em; color:var(--teal); text-transform:uppercase; margin-bottom:8px; }
    .leaderboard ol{ list-style:none; display:flex; flex-direction:column; gap:5px; }
    .leaderboard li{ display:flex; justify-content:space-between; gap:14px; color:#fff; }
    .leaderboard li span:last-child{ color:var(--teal-bright); font-weight:700; }
    .version{ position:absolute; right:16px; bottom:14px; z-index:4; font-family:var(--font-soft); color:#fff; font-size:12px; opacity:.6; }

    @media (max-width:560px){ .leaderboard{ display:none; } }
    @media (prefers-reduced-motion:reduce){ #title *{ animation:none !important; transition:none !important; } .rays, .portal, .scenery{ transform:none !important; } }

    #rotate-notice{ display:none; }
    @media (orientation:portrait) and (pointer:coarse){
      #rotate-notice{ display:flex; position:fixed; inset:0; z-index:9999; flex-direction:column; align-items:center; justify-content:center;
        gap:18px; text-align:center; background:var(--bg); color:#fff; font-family:var(--font);
        padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px); }
      #rotate-notice svg{ width:84px; height:84px; animation:rotate-hint 2.4s ease-in-out infinite; }
      #rotate-notice .t{ font-size:22px; color:var(--teal); }
      #rotate-notice .s{ font-size:15px; color:#fff; opacity:.8; max-width:280px; line-height:1.5; }
    }
    @keyframes rotate-hint{ 0%,40%{ transform:rotate(0);} 60%,100%{ transform:rotate(-90deg);} }
  </style>
</head>
<body>
  <!-- ─── Animated HTML title (game elements, any resolution, no borders) ─── -->
  <div id="title">
    <div class="layer rays" aria-hidden="true"></div>
    <div class="layer fog" aria-hidden="true"><div class="fb fb1"></div><div class="fb fb2"></div></div>
    <div class="layer cave" aria-hidden="true">
      <svg viewBox="0 0 480 560" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
        <defs>
          <radialGradient id="cdepth" cx=".5" cy=".74" r=".64">
            <stop offset="0" stop-color="#000000"/><stop offset=".68" stop-color="#040406"/><stop offset="1" stop-color="#0a0a0d"/></radialGradient>
          <linearGradient id="rock" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#17141d"/><stop offset="1" stop-color="#0a0910"/></linearGradient>
          <filter id="cglow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="3"/></filter>
        </defs>
        <!-- deep opening -->
        <path fill="url(#cdepth)" d="M150 560 V250 Q150 120 240 120 Q330 120 330 250 V560 Z"/>
        <!-- jagged rock frame around the opening -->
        <path fill="url(#rock)" stroke="#08070d" stroke-width="2" stroke-linejoin="round"
          d="M92 560 L88 470 L104 408 L92 344 L110 286 L98 232 L126 188 L112 150 L150 120 L176 92 L214 76 L240 70 L268 76 L306 92 L332 120 L368 150 L356 188 L384 232 L372 286 L390 344 L378 408 L394 470 L390 560 L330 560 V250 Q330 120 240 120 Q150 120 150 250 V560 Z"/>
        <!-- crevices for depth -->
        <g fill="#070610" opacity=".7">
          <path d="M118 300 L130 340 L112 360 L104 320 Z"/><path d="M362 300 L372 340 L356 362 L350 322 Z"/><path d="M150 470 L168 500 L150 520 L138 488 Z"/>
        </g>
        <!-- stalactites hanging inside the arch -->
        <g fill="url(#rock)" stroke="#08070d" stroke-width="1.2">
          <path d="M168 132 L176 178 L184 134 Z"/><path d="M200 124 L206 162 L214 126 Z"/><path d="M236 122 L242 200 L250 124 Z"/><path d="M272 126 L278 168 L286 124 Z"/><path d="M300 132 L306 156 L314 134 Z"/>
        </g>
        <!-- stalagmites at the base -->
        <g fill="url(#rock)" stroke="#08070d" stroke-width="1.2">
          <path d="M158 560 L170 506 L182 560 Z"/><path d="M300 560 L312 514 L324 560 Z"/>
        </g>
        <!-- embedded glowing crystals -->
        <path fill="#5bf0d6" filter="url(#cglow)" opacity=".7" d="M104 250 L112 264 L104 280 L96 264 Z"/>
        <path fill="#bdfff4" d="M104 252 L110.5 264 L104 277 L97.5 264 Z"/>
        <path fill="#9b7fe6" filter="url(#cglow)" opacity=".7" d="M380 300 L387 312 L380 326 L373 312 Z"/>
        <path fill="#d8caff" d="M380 302 L385.5 312 L380 323 L374.5 312 Z"/>
        <path fill="#5bf0d6" filter="url(#cglow)" opacity=".6" d="M360 460 L366 470 L360 482 L354 470 Z"/>
        <!-- cracks -->
        <g stroke="#070610" stroke-width="1.4" fill="none" opacity=".8" stroke-linecap="round">
          <path d="M120 200 L132 226 L126 250"/><path d="M372 220 L360 244 L368 268"/></g>
        <!-- faint teal rim light along the opening -->
        <path fill="none" stroke="rgba(91,240,214,.18)" stroke-width="2" d="M150 560 V250 Q150 120 240 120 Q330 120 330 250 V560"/>
      </svg>
    </div>
    <div class="layer portal" aria-hidden="true">
      <div class="core"></div>
    </div>
    <div class="layer motes" id="motes" aria-hidden="true"></div>
    <div class="layer scenery" aria-hidden="true">
      <svg class="treesvg" id="treesvg" aria-hidden="true"></svg>
    </div>
    <div class="layer" style="background:radial-gradient(115% 85% at 50% 40%, transparent 50%, rgba(4,3,9,.88) 100%)" aria-hidden="true"></div>
    <div class="layer intro" aria-hidden="true"></div>

    <div class="leaderboard" id="leaderboard"><h3>Top Extractors</h3><ol id="lb-list"></ol></div>

    <div class="stage">
      <div class="logo">
        <span class="t1">Tamer's</span>
        <span class="t2">Quest</span>
        <div class="rule"></div>
      </div>
      <div class="tagline">Monster Taming &amp; Cave Extraction</div>

      <!-- title figure — matches the in-game player character (drawCharacter):
           rounded dark cloak, tattered hem, pointed hood, teal rim light + eyes,
           spirit-chain held to the side -->
      <svg class="figure" viewBox="0 0 240 300" aria-hidden="true"
        style="width:clamp(130px,19vh,210px);height:auto;filter:drop-shadow(0 12px 28px rgba(0,0,0,.6))">
        <defs><filter id="eglow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="3"/></filter></defs>
        <ellipse cx="104" cy="288" rx="66" ry="9" fill="rgba(0,0,0,.5)"/>
        <!-- lower cloak + tattered hem -->
        <ellipse cx="104" cy="188" rx="72" ry="98" fill="#181522"/>
        <g fill="#0e0c16">
          <rect x="44" y="250" width="22" height="30" rx="4"/><rect x="70" y="250" width="22" height="40" rx="4"/>
          <rect x="96" y="250" width="22" height="46" rx="4"/><rect x="122" y="250" width="22" height="40" rx="4"/>
          <rect x="148" y="250" width="22" height="30" rx="4"/>
        </g>
        <!-- shoulders + cool rim light -->
        <ellipse cx="104" cy="120" rx="60" ry="66" fill="#181522"/>
        <ellipse cx="58" cy="128" rx="14" ry="74" fill="#2fd3b5" opacity=".16"/>
        <!-- pointed hood -->
        <ellipse cx="104" cy="66" rx="54" ry="60" fill="#181522"/>
        <ellipse cx="104" cy="36" rx="33" ry="38" fill="#181522"/>
        <ellipse cx="80" cy="60" rx="14" ry="42" fill="#2fd3b5" opacity=".14"/>
        <!-- shadowed face + glowing teal eyes -->
        <ellipse cx="104" cy="80" rx="32" ry="38" fill="#0c0a14"/>
        <g class="glow" style="transform-origin:104px 80px;animation:breathe 3s ease-in-out infinite">
          <circle cx="92" cy="80" r="8" fill="#bdfff4" filter="url(#eglow)"/><circle cx="116" cy="80" r="8" fill="#bdfff4" filter="url(#eglow)"/>
        </g>
        <circle cx="92" cy="80" r="6" fill="#eafffb"/><circle cx="116" cy="80" r="6" fill="#eafffb"/>
        <!-- spirit-chain held to the side -->
        <path d="M150 150 L188 176" stroke="#181522" stroke-width="14" stroke-linecap="round"/>
        <g class="glow" style="transform-origin:188px 176px;animation:breathe 3.4s ease-in-out infinite">
          <circle cx="188" cy="176" r="44" fill="#2fd3b5" opacity=".12"/><circle cx="188" cy="176" r="30" fill="#2fd3b5" opacity=".2"/>
        </g>
        <circle cx="188" cy="176" r="30" fill="none" stroke="#5bf0d6" stroke-width="3"/>
        <g class="chain" style="transform-origin:188px 176px;animation:spin 13s linear infinite" fill="#eafffb">
          <circle cx="218" cy="176" r="4.6"/><circle cx="209.2" cy="197.2" r="4.6"/><circle cx="188" cy="206" r="4.6"/>
          <circle cx="166.8" cy="197.2" r="4.6"/><circle cx="158" cy="176" r="4.6"/><circle cx="166.8" cy="154.8" r="4.6"/>
          <circle cx="188" cy="146" r="4.6"/><circle cx="209.2" cy="154.8" r="4.6"/>
        </g>
        <circle cx="188" cy="176" r="6" fill="#eafffb" filter="url(#eglow)"/><circle cx="188" cy="176" r="3.4" fill="#fff"/>
      </svg>

      <div class="actions">
        <button class="btn primary" data-go="onlineLobby">Multiplayer</button>
        <button class="btn ghost" data-go="characterSelect">Singleplayer</button>
        <button class="storelink" data-go="cosmetics">Cosmetics Store</button>
        <div class="logins">
          <span class="sep">Sign in</span>
          <button class="btn login" data-login="Google">Continue with Google</button>
          <button class="btn login" data-login="Discord">Continue with Discord</button>
          <button class="btn login" data-login="Tamer's Account">Tamer's Account</button>
        </div>
        <div class="hint">Press ENTER for Singleplayer</div>
      </div>
    </div>
    <div class="version">v1.0.0</div>
  </div>

  <div id="toast"></div>

  <div id="rotate-notice" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2FD3B5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="2.5" width="10" height="19" rx="2" /><line x1="7" y1="18.5" x2="17" y2="18.5" /><circle cx="12" cy="20" r="0.4" fill="#2FD3B5" />
    </svg>
    <div class="t">Rotate your device</div>
    <div class="s">Tamer's Quest plays best in landscape. Turn your phone sideways to begin.</div>
  </div>

  <script>
    (function(){
      const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
      // Rising embers.
      const m = document.getElementById("motes");
      const emberCols = ["#5BF0D6","#5BF0D6","#5BF0D6","#E0A85C","#9B7FE6"];
      for (let i=0;i<38;i++){
        const d=document.createElement("div"); d.className="mote"; const c=emberCols[i%emberCols.length];
        d.style.left=(Math.random()*100)+"vw"; d.style.setProperty("--dx",(Math.random()*80-40)+"px");
        const dur=(7+Math.random()*10); d.style.animationDuration=dur+"s"; d.style.animationDelay=(-Math.random()*dur)+"s";
        const sz=(1.5+Math.random()*2.8); d.style.width=d.style.height=sz+"px"; d.style.background=c; d.style.boxShadow="0 0 7px "+c;
        m.appendChild(d);
      }

      // ── Fractal trees: recursive gnarled branching (an L-system-style tree) ──
      const NS="http://www.w3.org/2000/svg";
      function buildTrees(){
        const svg=document.getElementById("treesvg"); if(!svg) return;
        const W=innerWidth, H=innerHeight; svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
        const frag=document.createDocumentFragment(); const tips=[];
        function grow(x,y,ang,len,w,depth){
          if(depth<=0 || len<5) return;
          const x2=x+Math.cos(ang)*len, y2=y+Math.sin(ang)*len;
          const l=document.createElementNS(NS,"line");
          l.setAttribute("x1",x.toFixed(1)); l.setAttribute("y1",y.toFixed(1));
          l.setAttribute("x2",x2.toFixed(1)); l.setAttribute("y2",y2.toFixed(1));
          l.setAttribute("stroke","#0a0714"); l.setAttribute("stroke-width",Math.max(1,w).toFixed(1)); l.setAttribute("stroke-linecap","round");
          frag.appendChild(l);
          if(depth<=2 && Math.random()<0.22) tips.push([x2,y2]);
          const n = depth>4 ? 2 : (Math.random()<0.5 ? 2 : 3);
          for(let i=0;i<n;i++){
            const spread=(i-(n-1)/2);
            const a=ang + spread*(0.30+Math.random()*0.30) + (Math.random()-0.5)*0.24;
            grow(x2,y2,a,len*(0.72+Math.random()*0.13),w*0.74,depth-1);
          }
        }
        // Full-width jagged ground (covers the entire page width on any desktop).
        const gy = H * 0.9; let gd = `M0 ${H} L0 ${gy.toFixed(0)}`;
        const segs = Math.max(24, Math.round(W / 70));
        for (let i = 0; i <= segs; i++) {
          const gx = (W / segs) * i;
          const yy = gy - Math.abs(Math.sin(i * 1.7)) * (H * 0.02) - Math.random() * (H * 0.02);
          gd += ` L${gx.toFixed(0)} ${yy.toFixed(0)}`;
        }
        gd += ` L${W} ${H} Z`;
        const ground = document.createElementNS(NS, "path");
        ground.setAttribute("d", gd); ground.setAttribute("fill", "#070510"); frag.appendChild(ground);

        // Thick, gnarled "scary dark-forest" trees rooted in the ground.
        const L = Math.min(H * 0.22, 240), R = gy + 6;
        grow(W*0.05, R, -Math.PI/2+0.15, L,      62, 10);  // towering outer
        grow(W*0.95, R, -Math.PI/2-0.15, L,      62, 10);
        grow(W*0.17, R, -Math.PI/2+0.08, L*0.85, 46, 9);
        grow(W*0.83, R, -Math.PI/2-0.08, L*0.85, 46, 9);
        grow(W*0.30, R, -Math.PI/2+0.05, L*0.66, 32, 9);   // mid
        grow(W*0.70, R, -Math.PI/2-0.05, L*0.66, 32, 9);
        grow(W*0.41, R, -Math.PI/2+0.02, L*0.5,  22, 8);   // inner
        grow(W*0.59, R, -Math.PI/2-0.02, L*0.5,  22, 8);
        for(const [tx,ty] of tips){
          const c=document.createElementNS(NS,"circle");
          c.setAttribute("cx",tx.toFixed(1)); c.setAttribute("cy",ty.toFixed(1)); c.setAttribute("r","1.5");
          c.setAttribute("fill","#5bf0d6"); c.setAttribute("opacity","0.4"); frag.appendChild(c);
        }
        svg.replaceChildren(frag);
      }
      buildTrees();
      let rt; addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(buildTrees, 220); }, {passive:true});

      // Parallax depth.
      if(!reduce && matchMedia("(pointer:fine)").matches){
        const root=document.documentElement;
        addEventListener("pointermove",(ev)=>{
          const x=(ev.clientX/innerWidth-.5), y=(ev.clientY/innerHeight-.5);
          root.style.setProperty("--px",(-x*26)+"px"); root.style.setProperty("--py",(-y*26)+"px");
        }, {passive:true});
      }
    })();

    function launch(dest){
      const t=document.getElementById("title"); if(t) t.classList.add("hidden");
      const tryGo=()=>{ if(window.tqGo){ window.tqGo(dest); } else { setTimeout(tryGo,80); } };
      tryGo();
    }
    document.querySelectorAll("#title [data-go]").forEach(b=>b.addEventListener("click",()=>launch(b.dataset.go)));

    // Login placeholders (not wired yet) — show a transient note.
    let toastT; function showToast(msg){ const t=document.getElementById("toast"); if(!t) return;
      t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2400); }
    document.querySelectorAll("#title [data-login]").forEach(b=>b.addEventListener("click",()=>showToast(b.dataset.login+" sign-in coming soon")));

    addEventListener("keydown",(e)=>{
      const t=document.getElementById("title"); if(!t || t.classList.contains("hidden")) return;
      if(e.key==="Enter") launch("characterSelect");
    });
    window.addEventListener("tq:title", ()=>{
      const t=document.getElementById("title"); if(!t) return; t.classList.remove("hidden");
      const old=t.querySelector(".intro"); if(old){ const n=old.cloneNode(false); old.replaceWith(n); }
    });

    fetch("/api/leaderboard").then(r=>r.ok?r.json():null).then(d=>{
      const top=(d&&d.extractions)||[]; if(!top.length) return;
      document.getElementById("lb-list").innerHTML = top.slice(0,5)
        .map((e,i)=>`<li><span>${i+1}. ${(e.name||"?").replace(/[<>&]/g,"")}</span><span>${e.value}</span></li>`).join("");
      document.getElementById("leaderboard").classList.add("show");
    }).catch(()=>{});
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
